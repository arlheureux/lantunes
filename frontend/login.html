<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanTunes - Login</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-container {
            background: #282828;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 48px;
            color: #bb86fc;
        }
        .logo h1 {
            margin-top: 10px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            background: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .form-group input:focus {
            box-shadow: 0 0 0 2px #bb86fc;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #bb86fc;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #a66dfc; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error {
            background: #ff3b30;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
        .toggle-link span {
            color: #bb86fc;
            cursor: pointer;
        }
        .spinner {
            text-align: center;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="logo">
                <i class="fas fa-music"></i>
                <h1>LanTunes</h1>
            </div>
            
            <div v-if="loading" class="spinner">
                <i class="fas fa-spinner fa-spin"></i> Loading...
            </div>
            
            <div v-else-if="mode === 'setup'">
                <h2 style="margin-bottom:20px;text-align:center;">Create Admin Account</h2>
                <p style="margin-bottom:20px;color:#aaa;font-size:14px;">Create your admin account to get started.</p>
                
                <div class="error" v-if="error">{{ error }}</div>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" v-model="username" placeholder="Enter username" name="username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" v-model="password" placeholder="Enter password" name="password" autocomplete="new-password">
                </div>
                <button class="btn" @click="doSetup" :disabled="!username || !password || submitting">
                    {{ submitting ? 'Creating...' : 'Create Admin' }}
                </button>
            </div>
            
            <div v-else-if="mode === 'login'">
                <h2 style="margin-bottom:20px;text-align:center;">Login</h2>
                
                <div class="error" v-if="error">{{ error }}</div>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" v-model="username" placeholder="Enter username" name="username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" v-model="password" placeholder="Enter password" name="password" autocomplete="current-password">
                </div>
                <button class="btn" @click="doLogin" :disabled="!username || !password || submitting">
                    {{ submitting ? 'Logging in...' : 'Login' }}
                </button>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const mode = ref('loading');
                const username = ref('');
                const password = ref('');
                const error = ref('');
                const submitting = ref(false);
                
                async function checkMode() {
                    try {
                        const res = await fetch('/api/auth/status');
                        const data = await res.json();
                        mode.value = data.needs_setup ? 'setup' : 'login';
                    } catch (e) {
                        error.value = 'Could not connect to server';
                        mode.value = 'login';
                    }
                }
                
                async function doLogin() {
                    error.value = '';
                    submitting.value = true;
                    
                    try {
                        const res = await fetch('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        
                        const data = await res.json();
                        
                        if (!res.ok) {
                            error.value = data.detail || 'Login failed';
                            return;
                        }
                        
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/';
                    } catch (e) {
                        error.value = 'Network error';
                    } finally {
                        submitting.value = false;
                    }
                }
                
                async function doSetup() {
                    error.value = '';
                    submitting.value = true;
                    
                    try {
                        const res = await fetch('/api/auth/setup', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        
                        const data = await res.json();
                        
                        if (!res.ok) {
                            error.value = data.detail || 'Setup failed';
                            return;
                        }
                        
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/';
                    } catch (e) {
                        error.value = 'Network error';
                    } finally {
                        submitting.value = false;
                    }
                }
                
                checkMode();
                
                return { mode, username, password, error, submitting, doLogin, doSetup };
            }
        }).mount('#app');
    </script>
</body>
</html>
