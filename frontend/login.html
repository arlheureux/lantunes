<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LanTunes - Login</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #181818;
            --bg-tertiary: #1a1a1a;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --text-primary: #fff;
            --text-secondary: #b3b3b3;
            --text-muted: #6a6a6a;
            --border-radius-md: 8px;
            --transition-fast: 0.15s ease;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo i {
            font-size: 48px;
            color: var(--accent);
            margin-bottom: 16px;
        }
        
        .login-logo h1 {
            font-size: 32px;
            font-weight: 700;
        }
        
        .login-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius-md);
            padding: 32px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        
        .login-card h2 {
            font-size: 20px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid #333;
            border-radius: var(--border-radius-md);
            color: var(--text-primary);
            font-size: 15px;
            transition: all var(--transition-fast);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 500px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all var(--transition-fast);
        }
        
        .btn:hover {
            background: var(--accent-hover);
        }
        
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        
        .error {
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff3b30;
            padding: 12px 16px;
            border-radius: var(--border-radius-md);
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-container">
            <div class="login-logo">
                <i class="fas fa-music"></i>
                <h1>LanTunes</h1>
            </div>
            
            <div class="login-card">
                <!-- Setup Mode (no admin exists) -->
                <div v-if="mode === 'setup'">
                    <h2>Create Admin Account</h2>
                    <div v-if="error" class="error">{{ error }}</div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" v-model="username" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" v-model="password" placeholder="Enter password">
                    </div>
                    <button class="btn" @click="doSetup" :disabled="loading">
                        {{ loading ? 'Creating...' : 'Create Admin' }}
                    </button>
                </div>
                
                <!-- Login Mode -->
                <div v-else-if="mode === 'login'">
                    <h2>Login</h2>
                    <div v-if="error" class="error">{{ error }}</div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" v-model="username" placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" v-model="password" placeholder="Enter password">
                    </div>
                    <button class="btn" @click="doLogin" :disabled="loading">
                        {{ loading ? 'Logging in...' : 'Login' }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        
        createApp({
            setup() {
                const mode = ref('loading');
                const loading = ref(false);
                const error = ref('');
                const username = ref('');
                const password = ref('');
                
                async function apiCall(url, opts = {}) {
                    try {
                        const res = await fetch(url, opts);
                        const text = await res.text();
                        let data;
                        try {
                            data = text ? JSON.parse(text) : {};
                        } catch {
                            data = {};
                        }
                        if (!res.ok) {
                            throw new Error(data.detail || data.message || `Request failed (${res.status})`);
                        }
                        return data;
                    } catch (e) {
                        throw e;
                    }
                }
                
                async function checkMode() {
                    // Check if already logged in
                    const token = localStorage.getItem('access_token');
                    if (token) {
                        try {
                            await apiCall('/api/auth/me');
                            window.location.href = '/';
                            return;
                        } catch (e) {
                            localStorage.removeItem('access_token');
                            localStorage.removeItem('refresh_token');
                            localStorage.removeItem('user');
                        }
                    }
                    
                    // Show login by default
                    mode.value = 'login';
                }
                
                async function doSetup() {
                    if (!username.value || !password.value) {
                        error.value = 'Please enter username and password';
                        return;
                    }
                    
                    loading.value = true;
                    error.value = '';
                    
                    try {
                        const data = await apiCall('/api/auth/setup', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('refresh_token', data.refresh_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/';
                    } catch (e) {
                        error.value = e.message;
                    } finally {
                        loading.value = false;
                    }
                }
                
                async function doLogin() {
                    if (!username.value || !password.value) {
                        error.value = 'Please enter username and password';
                        return;
                    }
                    
                    loading.value = true;
                    error.value = '';
                    
                    try {
                        const data = await apiCall('/api/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username.value, password: password.value })
                        });
                        
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('refresh_token', data.refresh_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/';
                    } catch (e) {
                        error.value = e.message;
                    } finally {
                        loading.value = false;
                    }
                }
                
                onMounted(() => {
                    checkMode();
                });
                
                return {
                    mode, loading, error, username, password,
                    doSetup, doLogin
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
